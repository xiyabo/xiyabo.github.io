<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyFit - AI 3D试衣间</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#fff8f8;
    color:#333;
}

/* 顶部导航 */

.navbar{
    width:100%;
    height:80px;
    background:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 60px;
    box-shadow:0 4px 20px rgba(255,192,203,0.08);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:34px;
    font-weight:700;
    color:#ff6b9f;
}

.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color:#666;
    font-weight:500;
    transition:0.3s;
}

.nav-links a:hover{
    color:#ff6b9f;
}

.user-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.vip-btn{
    background:linear-gradient(135deg,#ff7eb3,#ff4f87);
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:30px;
    font-weight:600;
    cursor:pointer;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=200');
    background-size:cover;
    background-position:center;
}

/* hero */

.hero{
    width:100%;
    padding:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.hero-left{
    width:45%;
}

.hero-left h1{
    font-size:70px;
    line-height:1.1;
    margin-bottom:25px;
}

.hero-left h1 span{
    color:#ff5f95;
}

.hero-left p{
    font-size:18px;
    color:#777;
    line-height:1.8;
    margin-bottom:35px;
}

.hero-btns{
    display:flex;
    gap:20px;
}

.primary-btn{
    background:linear-gradient(135deg,#ff7eb3,#ff4f87);
    color:white;
    border:none;
    padding:18px 36px;
    border-radius:18px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.secondary-btn{
    background:white;
    border:1px solid #ffd2df;
    padding:18px 36px;
    border-radius:18px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

/* 中间人物 */

.hero-right{
    width:45%;
    position:relative;
}

.hero-circle{
    width:500px;
    height:500px;
    background:radial-gradient(circle,#ffe3ec,#fff8f8);
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero-circle img{
    height:600px;
    object-fit:contain;
}

/* 主体布局 */

.main-container{
    display:grid;
    grid-template-columns:280px 1fr 340px;
    gap:30px;
    padding:0 60px 60px;
}

/* 卡片 */

.card{
    background:white;
    border-radius:28px;
    padding:25px;
    box-shadow:0 10px 30px rgba(255,182,193,0.12);
}

/* 左边 */

.profile-card img{
    width:70px;
    height:70px;
    border-radius:50%;
    margin-bottom:15px;
}

.profile-card h3{
    margin-bottom:10px;
}

.data-list{
    margin-top:25px;
}

.data-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
    padding-bottom:12px;
    border-bottom:1px solid #f5f5f5;
}

.update-btn{
    width:100%;
    margin-top:25px;
    background:#fff0f5;
    border:none;
    height:52px;
    border-radius:16px;
    color:#ff5f95;
    font-weight:600;
    cursor:pointer;
}

/* 中间试衣 */

.viewer-card{
    position:relative;
    min-height:850px;
}

.viewer-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
}

.viewer-tabs{
    display:flex;
    gap:20px;
}

.viewer-tabs button{
    border:none;
    background:none;
    font-size:16px;
    font-weight:600;
    color:#999;
    cursor:pointer;
}

.viewer-tabs button.active{
    color:#ff5f95;
}

.viewer{
    width:100%;
    height:700px;
    border-radius:24px;
    background:#fff8fb;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.viewer img{
    height:95%;
}

/* 右边上传 */

.upload-box{
    width:100%;
    height:180px;
    border:2px dashed #ffc7d8;
    border-radius:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#999;
    cursor:pointer;
    margin-top:20px;
}

.plus{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#fff0f5;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:#ff5f95;
    margin-bottom:15px;
}

.clothes-grid{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.clothes-item{
    background:#fff7fa;
    border-radius:18px;
    overflow:hidden;
    padding:10px;
    transition:0.3s;
    cursor:pointer;
}

.clothes-item:hover{
    transform:translateY(-5px);
}

.clothes-item img{
    width:100%;
    border-radius:14px;
}

.try-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    margin-top:25px;
    background:linear-gradient(135deg,#ff7eb3,#ff4f87);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

/* 试穿记录 */

.history{
    padding:0 60px 80px;
}

.history h2{
    margin-bottom:30px;
}

.history-list{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:25px;
}

.history-item{
    background:white;
    border-radius:24px;
    padding:15px;
    box-shadow:0 10px 20px rgba(255,182,193,0.1);
    transition:0.3s;
}

.history-item:hover{
    transform:translateY(-6px);
}

.history-item img{
    width:100%;
    border-radius:18px;
    margin-bottom:12px;
}

.history-item p{
    color:#888;
    font-size:14px;
}

/* 页脚 */

.footer{
    width:100%;
    padding:40px 60px;
    border-top:1px solid #f3e5ea;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#999;
}

.socials{
    display:flex;
    gap:15px;
}

.social{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#fff0f5;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ff5f95;
}

/* 响应式 */

@media(max-width:1200px){

.main-container{
    grid-template-columns:1fr;
}

.hero{
    flex-direction:column;
    text-align:center;
    gap:50px;
}

.hero-left{
    width:100%;
}

.hero-right{
    width:100%;
}

.hero-btns{
    justify-content:center;
}

.history-list{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:768px){

.nav-links{
    display:none;
}

.navbar{
    padding:0 20px;
}

.hero{
    padding:30px 20px;
}

.hero-left h1{
    font-size:42px;
}

.main-container{
    padding:0 20px 40px;
}

.history{
    padding:0 20px 40px;
}

.history-list{
    grid-template-columns:1fr;
}

.hero-circle{
    width:320px;
    height:320px;
}

.hero-circle img{
    height:420px;
}

.footer{
    padding:30px 20px;
    flex-direction:column;
    gap:20px;
}

}

</style>
</head>

<body>

<!-- 导航 -->

<div class="navbar">

    <div class="logo">MyFit</div>

    <div class="nav-links">
        <a href="#">首页</a>

</body>
