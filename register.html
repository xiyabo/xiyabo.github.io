<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFit 注册</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:
    linear-gradient(135deg,#fff5f7,#ffe5ee);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.register-card{
    width:520px;
    background:white;
    border-radius:40px;
    padding:50px;
    box-shadow:0 20px 50px rgba(255,182,193,0.2);
}

.logo{
    text-align:center;
    font-size:40px;
    font-weight:700;
    color:#ff5f95;
    margin-bottom:20px;
}

.title{
    text-align:center;
    font-size:38px;
    font-weight:700;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:#888;
    margin-bottom:40px;
}

.input-group{
    margin-bottom:22px;
}

.input-group label{
    display:block;
    margin-bottom:10px;
    color:#555;
    font-weight:500;
}

.input-group input{
    width:100%;
    height:58px;
    border:none;
    background:#fff5f8;
    border-radius:18px;
    padding:0 20px;
    font-size:16px;
    outline:none;
}

.input-group input:focus{
    background:white;
    box-shadow:0 0 0 3px rgba(255,95,149,0.15);
}

.code-box{
    display:flex;
    gap:15px;
}

.send-btn{
    width:140px;
    border:none;
    border-radius:16px;
    background:#ffe5ee;
    color:#ff5f95;
    font-weight:600;
    cursor:pointer;
}

.register-btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#ff7eb3,#ff4f87);
    color:white;
    font-size:18px;
    font-weight:600;
    margin-top:20px;
    cursor:pointer;
}

.agreement{
    margin-top:20px;
    font-size:14px;
    color:#888;
    line-height:1.8;
}

.agreement a{
    color:#ff5f95;
    text-decoration:none;
}

.login-link{
    text-align:center;
    margin-top:30px;
    color:#888;
}

.login-link a{
    color:#ff5f95;
    text-decoration:none;
    font-weight:600;
}

</style>
</head>

<body>

<div class="register-card">

    <div class="logo">MyFit</div>

    <div class="title">
        创建账号
    </div>

    <div class="sub">
        开启你的AI虚拟穿搭体验
    </div>

    <div class="input-group">
        <label>昵称</label>
        <input type="text" placeholder="请输入昵称">
    </div>

    <div class="input-group">
        <label>手机号</label>
        <input type="text" placeholder="请输入手机号">
    </div>

    <div class="input-group">
        <label>验证码</label>

        <div class="code-box">

            <input type="text" placeholder="请输入验证码">

            <button class="send-btn">
                获取验证码
            </button>

        </div>

    </div>

    <div class="input-group">
        <label>密码</label>
        <input type="password" placeholder="请输入密码">
    </div>

    <div class="input-group">
        <label>确认密码</label>
        <input type="password" placeholder="请再次输入密码">
    </div>

    <button class="register-btn">
        注册账号
    </button>

    <div class="agreement">

        <label>
            <input type="checkbox">
            我已阅读并同意
            <a href="#">用户协议</a>
            与
            <a href="#">隐私政策</a>
        </label>

    </div>

    <div class="login-link">

        已有账号？
        <a href="login.html">立即登录</a>

    </div>

</div>

</body>
</html>
