<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFit 登录</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:
    linear-gradient(135deg,#fff6f8,#ffe7ef);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 背景装饰 */

.bg-circle1{
    position:absolute;
    width:500px;
    height:500px;
    background:#ffd9e7;
    border-radius:50%;
    top:-150px;
    left:-120px;
    filter:blur(80px);
    opacity:0.7;
}

.bg-circle2{
    position:absolute;
    width:400px;
    height:400px;
    background:#ffc2d8;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(80px);
    opacity:0.6;
}

/* 登录卡片 */

.login-container{
    width:1100px;
    height:680px;
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(25px);
    border-radius:40px;
    overflow:hidden;
    display:flex;
    position:relative;
    z-index:10;
    box-shadow:0 20px 50px rgba(255,182,193,0.25);
}

/* 左边 */

.left-side{
    flex:1;
    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,0.2),
    rgba(255,255,255,0.05)
    );
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:80px;
}

.logo{
    font-size:42px;
    font-weight:700;
    color:#ff5f95;
    margin-bottom:25px;
}

.left-side h1{
    font-size:58px;
    line-height:1.1;
    margin-bottom:25px;
    color:#222;
}

.left-side h1 span{
    color:#ff5f95;
}

.left-side p{
    font-size:18px;
    line-height:1.8;
    color:#666;
    max-width:480px;
}

/* 右边 */

.right-side{
    width:460px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.login-box{
    width:100%;
}

.login-title{
    font-size:38px;
    font-weight:700;
    margin-bottom:10px;
}

.login-sub{
    color:#888;
    margin-bottom:40px;
}

.input-group{
    margin-bottom:25px;
}

.input-group label{
    display:block;
    margin-bottom:10px;
    font-weight:500;
    color:#555;
}

.input-group input{
    width:100%;
    height:58px;
    border:none;
    background:#fff5f8;
    border-radius:18px;
    padding:0 20px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

.input-group input:focus{
    background:white;
    box-shadow:0 0 0 3px rgba(255,95,149,0.15);
}

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
    font-size:14px;
    color:#777;
}

.options a{
    color:#ff5f95;
    text-decoration:none;
}

.login-btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#ff7eb3,#ff4f87);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(255,95,149,0.25);
}

.divider{
    text-align:center;
    margin:35px 0;
    color:#bbb;
    position:relative;
}

.divider::before,
.divider::after{
    content:'';
    position:absolute;
    width:35%;
    height:1px;
    background:#eee;
    top:50%;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.social-login{
    display:flex;
    gap:15px;
}

.social-btn{
    flex:1;
    height:54px;
    border:none;
    border-radius:16px;
    background:#fff5f8;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.social-btn:hover{
    background:#ffe3ec;
}

.register-link{
    text-align:center;
    margin-top:30px;
    color:#888;
}

.register-link a{
    color:#ff5f95;
    text-decoration:none;
    font-weight:600;
}

/* 响应式 */

@media(max-width:1000px){

.login-container{
    width:95%;
    height:auto;
    flex-direction:column;
}

.left-side{
    padding:50px;
}

.right-side{
    width:100%;
}

.left-side h1{
    font-size:42px;
}

}

</style>
</head>

<body>

<div class="bg-circle1"></div>
<div class="bg-circle2"></div>

<div class="login-container">

    <!-- 左边 -->

    <div class="left-side">

        <div class="logo">MyFit</div>

        <h1>
            AI打造你的<br>
            <span>专属虚拟衣橱</span>
        </h1>

        <p>
            上传照片与身体数据，
            创建你的专属3D形象，
            在线体验AI智能试衣与穿搭推荐。
        </p>

    </div>

    <!-- 右边 -->

    <div class="right-side">

        <div class="login-box">

            <div class="login-title">
                欢迎回来
            </div>

            <div class="login-sub">
                登录你的 MyFit 账号
            </div>

            <form action="index.html">

                <div class="input-group">
                    <label>手机号 / 邮箱</label>
                    <input type="text" placeholder="请输入手机号或邮箱">
                </div>

                <div class="input-group">
                    <label>密码</label>
                    <input type="password" placeholder="请输入密码">
                </div>

                <button class="login-btn">
                    登录
                </button>

            </form>

            <div class="divider">
                或使用以下方式登录
            </div>

            <div class="social-login">

                <button class="social-btn">
                    微信
                </button>

                <button class="social-btn">
                    QQ
                </button>

                <button class="social-btn">
                    Apple
                </button>

            </div>

            <div class="register-link">
                还没有账号？
                <a href="register.html">立即注册</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
